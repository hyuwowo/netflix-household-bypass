<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Household Bypass</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/icon-128.png" alt="Logo" class="logo" />
            <div>
                <h1 class="title">Household Bypass</h1>
                <p class="subtitle">Seamless streaming, anywhere</p>
            </div>
        </div>

        <div class="glass-panel status-panel">
            <div class="status-row">
                <div class="pulse-dot"></div>
                <span class="status-text">Active</span>
            </div>
            <p class="desc">Network-level interception is running. Your Netflix experience stays fully native.</p>
        </div>

        <div class="glass-panel features">
            <div class="feature">
                <span class="feature-icon">🌐</span>
                <span class="feature-label">GraphQL Filter</span>
                <span class="feature-badge">ON</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🛡️</span>
                <span class="feature-label">Modal Shield</span>
                <span class="feature-badge">ON</span>
            </div>
            <div class="feature">
                <span class="feature-icon">▶️</span>
                <span class="feature-label">Auto Resume</span>
                <span class="feature-badge">ON</span>
            </div>
        </div>

        <footer>Free & Open Source</footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
